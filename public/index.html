<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Geggamoja Spacefoot B2B Feed</title>
    <style>
      :root { color-scheme: light dark; font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      body { align-items: center; background: #f7f4ef; color: #222; display: flex; justify-content: center; margin: 0; min-height: 100vh; }
      main { background: #fff; border-radius: 22px; box-shadow: 0 16px 40px rgb(0 0 0 / 10%); max-width: 760px; padding: 2rem; width: calc(100% - 2rem); }
      h1 { font-size: clamp(2rem, 7vw, 4rem); margin: 0 0 .5rem; }
      p { color: #555; font-size: 1.05rem; line-height: 1.6; }
      dl { display: grid; gap: 1rem; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); margin: 2rem 0; }
      div.stat { background: #f7f4ef; border-radius: 16px; padding: 1rem; }
      dt { color: #555; font-size: .9rem; font-weight: 700; margin-bottom: .35rem; text-transform: uppercase; }
      dd { font-size: 1.2rem; font-weight: 800; margin: 0; }
      a.button { background: #1d4f3f; border-radius: 999px; color: #fff; display: inline-block; font-weight: 800; padding: .95rem 1.35rem; text-decoration: none; }
      a.button[aria-disabled="true"] { opacity: .55; pointer-events: none; }
      .status { border-left: 4px solid #1d4f3f; margin-top: 1.5rem; padding: .5rem 0 .5rem 1rem; }
      .error { color: #9d1c1c; font-weight: 700; }
    </style>
  </head>
  <body>
    <main>
      <h1>Geggamoja</h1>
      <p>Spacefoot / France EUR B2B catalog feed generated automatically from Shopify Admin GraphQL API.</p>

      <dl aria-label="Feed metadata">
        <div class="stat">
          <dt>Last generation</dt>
          <dd id="generatedAt">Loading…</dd>
        </div>
        <div class="stat">
          <dt>Products</dt>
          <dd id="productCount">Loading…</dd>
        </div>
        <div class="stat">
          <dt>CSV rows</dt>
          <dd id="rowCount">Loading…</dd>
        </div>
      </dl>

      <a id="downloadButton" class="button" href="feed.csv" download aria-disabled="true">Download CSV</a>
      <p id="status" class="status">Loading feed metadata…</p>
    </main>

    <script>
      const generatedAt = document.querySelector('#generatedAt');
      const productCount = document.querySelector('#productCount');
      const rowCount = document.querySelector('#rowCount');
      const status = document.querySelector('#status');
      const downloadButton = document.querySelector('#downloadButton');

      fetch(`feed-meta.json?ts=${Date.now()}`, { headers: { Accept: 'application/json' } })
        .then((response) => {
          if (!response.ok) throw new Error('Feed metadata is not available yet. Run the GitHub Actions workflow first.');
          return response.json();
        })
        .then((metadata) => {
          generatedAt.textContent = metadata.generatedAt ? new Date(metadata.generatedAt).toLocaleString() : 'Unknown';
          productCount.textContent = Number(metadata.productCount ?? 0).toLocaleString();
          rowCount.textContent = Number(metadata.rowCount ?? 0).toLocaleString();
          downloadButton.href = metadata.file || 'feed.csv';
          downloadButton.removeAttribute('aria-disabled');
          status.textContent = 'Feed is ready.';
        })
        .catch((error) => {
          generatedAt.textContent = 'Not generated';
          productCount.textContent = '—';
          rowCount.textContent = '—';
          status.textContent = error.message;
          status.classList.add('error');
        });
    </script>
  </body>
</html>
